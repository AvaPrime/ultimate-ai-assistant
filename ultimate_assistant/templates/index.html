<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate AI Assistant</title>
  <style>
    :root { --bg: #f8f9fa; --text: #212529; --accent: #0d6efd; }
    [data-theme="dark"] { --bg: #1a1a2e; --text: #e0e0e0; --accent: #4dabf7; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: all 0.3s; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid #dee2e6; padding: 16px; overflow-y: auto; }
    [data-theme="dark"] .sidebar { background: #16213e; border-color: #2d3748; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #dee2e6; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    [data-theme="dark"] .header { background: #16213e; border-color: #2d3748; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; margin: 8px 0; line-height: 1.5; }
    .user { background: var(--accent); color: white; margin-left: auto; }
    .ai { background: #f1f3f5; }
    [data-theme="dark"] .ai { background: #2d3748; }
    .controls { padding: 16px; background: #fff; border-top: 1px solid #dee2e6; }
    [data-theme="dark"] .controls { background: #16213e; }
    input, select, button { padding: 10px 14px; font-size: 15px; border: 1px solid #ced4da; border-radius: 8px; }
    button { background: var(--accent); color: white; border: none; cursor: pointer; }
    button:hover { opacity: 0.9; }
    #mic.recording { background: #dc3545; }
    .session-item { padding: 8px 12px; margin: 4px 0; border-radius: 6px; cursor: pointer; }
    .session-item:hover { background: #e9ecef; }
    [data-theme="dark"] .session-item:hover { background: #2d3748; }
    .active-session { background: #d0ebff !important; }
    .dark-toggle { margin-left: auto; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar: Chat History -->
    <div class="sidebar">
      <h3 style="margin-top:0;">Chat History</h3>
      <button onclick="loadSessions()">Refresh Sessions</button>
      <div id="sessions-list" style="margin-top:12px;"></div>
      <hr>
      <button onclick="newSession()">+ New Chat</button>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div class="header">
        <select id="model">
          <option value="openai/gpt-4o">GPT-4o</option>
          <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="google/gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="x-ai/grok-4" selected>Grok-4</option>
          <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
        </select>

        <select id="voice">
          <optgroup label="English">
            <option value="rachel">Rachel</option>
            <option value="antoni">Antoni</option>
          </optgroup>
          <optgroup label="Spanish">
            <option value="pablo">Pablo</option>
          </optgroup>
          <!-- Add more as needed -->
        </select>

        <div>
          <label>Speed:</label>
          <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
          <span id="speedVal">1.0x</span>
        </div>

        <button onclick="cloneVoice()">Clone Voice</button>
        <input type="file" id="voice-clone-file" accept="audio/*" style="display:none;">

        <button class="dark-toggle" onclick="toggleDarkMode()">🌓</button>
      </div>

      <div id="chat"></div>

      <div class="controls">
        <div style="display:flex; gap:8px;">
          <input id="input" placeholder="Type or speak..." style="flex:1;">
          <button id="mic">🎤</button>
          <button onclick="send()">Send</button>
          <button onclick="exportChat()">Export</button>
          <button onclick="loadHistory()">Load History</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="player" autoplay></audio>

  <script>
    let sessionId = localStorage.getItem('session') || Date.now().toString(36);
    localStorage.setItem('session', sessionId);
    let currentTheme = localStorage.getItem('theme') || 'light';

    function toggleDarkMode() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', currentTheme);
      localStorage.setItem('theme', currentTheme);
    }

    // Apply saved theme
    document.documentElement.setAttribute('data-theme', currentTheme);

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const micBtn = document.getElementById('mic');
    const speedSlider = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const modelSelect = document.getElementById('model');
    const voiceSelect = document.getElementById('voice');

    speedSlider.oninput = () => speedVal.textContent = speedSlider.value + 'x';

    let mediaRecorder, chunks = [];

    micBtn.onclick = async () => {
      if (mediaRecorder?.state === 'recording') {
        mediaRecorder.stop();
        return;
      }
      chunks = [];
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = async () => {
        micBtn.textContent = '🎤';
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = async () => {
          const resp = await fetch('/transcribe', { method: 'POST', body: new URLSearchParams({ audio: reader.result }) });
          const { text } = await resp.json();
          input.value = text;
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      micBtn.textContent = 'Stop';
    };

    async function send() {
      const query = input.value.trim();
      if (!query) return;
      addMsg(query, 'user');
      input.value = '';

      const payload = {
        query,
        speed: parseFloat(speedSlider.value),
        voice: voiceSelect.value,
        model: modelSelect.value,
        session: sessionId
      };

      const resp = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let aiMsg = addMsg('', 'ai');
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        // Parse SSE and append
        // (simplified for brevity - in real code handle properly)
        if (buffer.includes('data: ')) {
          // handle streaming chunks
        }
      }
      // After stream, play TTS if available
    }

    function addMsg(text, sender) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function loadSessions() {
      const res = await fetch('/sessions');
      const sessions = await res.json();
      const list = document.getElementById('sessions-list');
      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item';
        div.textContent = s.timestamp + ' - ' + (s.preview || 'Chat');
        div.onclick = () => loadSession(s.id);
        list.appendChild(div);
      });
    }

    async function loadSession(id) {
      sessionId = id;
      localStorage.setItem('session', id);
      const res = await fetch(`/history/${id}`);
      const history = await res.json();
      chat.innerHTML = '';
      history.forEach(item => {
        addMsg(item.user, 'user');
        if (item.ai) addMsg(item.ai, 'ai');
      });
    }

    function newSession() {
      sessionId = Date.now().toString(36);
      localStorage.setItem('session', sessionId);
      chat.innerHTML = '';
      loadSessions();
    }

    async function cloneVoice() {
      const fileInput = document.getElementById('voice-clone-file');
      fileInput.onchange = async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('audio', file);
        const res = await fetch('/clone-voice', { method: 'POST', body: formData });
        const { voice_id } = await res.json();
        alert('Voice cloned! New voice ID: ' + voice_id + '. Use it by selecting custom voice.');
        // In real impl, add to voice select or store per session
      };
      fileInput.click();
    }

    function exportChat() {
      window.open(`/export/${sessionId}`, '_blank');
    }

    // Initial load
    window.onload = () => {
      loadSessions();
      // Auto-load current session history if exists
    };

    input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
