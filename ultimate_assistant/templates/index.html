<!DOCTYPE html>
<html>
<head>
  <title>Ultimate AI Assistant</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
    h1 { color: #1a1a2e; }
    #chat { height: 62vh; overflow-y: auto; border: 1px solid #ddd; padding: 16px; margin-bottom: 12px; background: white; border-radius: 12px; }
    .msg { margin: 10px 0; padding: 12px 16px; border-radius: 18px; max-width: 80%; }
    .user { background: #e3f2fd; margin-left: auto; }
    .ai { background: #f1f3f4; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, select, button { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #1a73e8; color: white; border: none; cursor: pointer; }
    #mic { background: #ea4335; }
    #mic.recording { background: #c5221f; }
    audio { display: none; }
  </style>
</head>
<body>
  <h1>Ultimate AI Assistant</h1>

  <div style="margin-bottom:12px; display:flex; gap:12px; flex-wrap:wrap;">
    <div>
      <label>Model:</label><br>
      <select id="model">
        {% for m in models %}
        <option value="{{ m.id }}">{{ m.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Voice:</label><br>
      <select id="voice">
        <optgroup label="English"><option value="rachel">Rachel</option><option value="antoni">Antoni</option></optgroup>
        <optgroup label="Spanish"><option value="pablo">Pablo</option><option value="isabella">Isabella</option></optgroup>
        <optgroup label="French"><option value="thomas">Thomas</option><option value="claire">Claire</option></optgroup>
        <optgroup label="German"><option value="hans">Hans</option><option value="anna">Anna</option></optgroup>
        <optgroup label="Mandarin"><option value="li">Li</option></optgroup>
        <optgroup label="Japanese"><option value="yuki">Yuki</option></optgroup>
      </select>
    </div>
    <div>
      <label>Speed: <span id="speedVal">1.0x</span></label><br>
      <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
    </div>
    <div>
      <label>Password:</label><br>
      <input id="password" type="password" placeholder="Optional" style="width:140px;">
    </div>
  </div>

  <div id="chat"></div>

  <div class="controls">
    <button id="mic">Mic</button>
    <input id="input" placeholder="Type or speak..." style="flex:1; min-width:200px;">
    <button onclick="send()">Send</button>
    <button onclick="loadHistory()">Load History</button>
    <button onclick="exportChat()">Export</button>
  </div>

  <audio id="player" autoplay></audio>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const micBtn = document.getElementById('mic');
  const speedSlider = document.getElementById('speed');
  const speedVal = document.getElementById('speedVal');
  const voiceSelect = document.getElementById('voice');
  const modelSelect = document.getElementById('model');
  const player = document.getElementById('player');
  const passwordInput = document.getElementById('password');

  speedSlider.oninput = () => speedVal.textContent = speedSlider.value + 'x';

  const sessionId = localStorage.getItem('session') || Date.now().toString(36);
  localStorage.setItem('session', sessionId);

  let mediaRecorder, chunks = [];

  micBtn.onclick = async () => {
    if (mediaRecorder?.state === 'recording') { mediaRecorder.stop(); return; }
    chunks = [];
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      micBtn.textContent = 'Mic'; micBtn.classList.remove('recording');
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = async () => {
        const resp = await fetch('/transcribe', { method: 'POST', body: new URLSearchParams({ audio: reader.result }) });
        const { text } = await resp.json();
        input.value = text;
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    micBtn.textContent = 'Stop'; micBtn.classList.add('recording');
  };

  async function send() {
    const query = input.value.trim();
    if (!query) return;
    addMsg(query, 'user');
    input.value = '';

    const payload = {
      query,
      speed: parseFloat(speedSlider.value),
      voice: voiceSelect.value,
      model: modelSelect.value,
      session: sessionId,
      password: passwordInput.value || null
    };

    const resp = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!resp.ok) {
      const err = await resp.json();
      addMsg('Error: ' + (err.detail || 'Request failed'), 'ai');
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let aiMsg = addMsg('', 'ai');
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));
          if (data.done) {
            if (data.audio) {
              player.src = `data:audio/mp3;base64,${data.audio}`;
              player.play();
            }
            return;
          }
          aiMsg.textContent += data.text;
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }
  }

  async function loadHistory() {
    const pw = passwordInput.value ? `?password=${passwordInput.value}` : '';
    const resp = await fetch(`/history/${sessionId}${pw}`);
    if (!resp.ok) {
      addMsg('Could not load history (wrong password?)', 'ai');
      return;
    }
    const { history } = await resp.json();
    chat.innerHTML = '';
    history.forEach(entry => {
      addMsg(entry.user, 'user');
      const aiDiv = addMsg(entry.ai, 'ai');
      if (entry.audio) {
        // Optional: show play button for old audio
      }
    });
  }

  function addMsg(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function exportChat() {
    const pw = passwordInput.value ? `?password=${passwordInput.value}` : '';
    window.open(`/export/${sessionId}${pw}`, '_blank');
  }

  input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
